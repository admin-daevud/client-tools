<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>to do. — daevud</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --surface-2: #f3f2ef;
    --border: rgba(0,0,0,0.10);
    --border-mid: rgba(0,0,0,0.18);
    --border-strong: rgba(0,0,0,0.28);
    --text: #1a1917;
    --text-2: #6b6a66;
    --text-3: #a09f9a;
    --red: #E24B4A;
    --amber: #EF9F27;
    --green: #1D9E75;
    --red-bg: #FCEBEB;
    --amber-bg: #FAEEDA;
    --green-bg: #EAF3DE;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181715;
      --surface: #211f1c;
      --surface-2: #2c2a26;
      --border: rgba(255,255,255,0.08);
      --border-mid: rgba(255,255,255,0.14);
      --border-strong: rgba(255,255,255,0.22);
      --text: #f0ede8;
      --text-2: #9e9c96;
      --text-3: #5e5d59;
      --red-bg: #2d1717;
      --amber-bg: #2b2010;
      --green-bg: #0f2018;
    }
  }

  html { font-size: 16px; }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 0 2rem;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-brand {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.3px;
  }
  .nav-brand span { color: var(--text-3); }
  .nav-back {
    font-size: 11px;
    color: var(--text-3);
    text-decoration: none;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: color 0.15s;
  }
  .nav-back:hover { color: var(--text); }

  /* MAIN */
  main {
    max-width: 600px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  .page-header { margin-bottom: 2rem; }
  .page-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 6px;
  }
  .page-header p {
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* FORM */
  .form-card {
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    margin-bottom: 1.5rem;
    background: var(--surface);
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .input-row input[type=text] {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 9px 12px;
    border: 0.5px solid var(--border-mid);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .input-row input[type=text]:focus { border-color: var(--border-strong); }
  .input-row input[type=text]::placeholder { color: var(--text-3); }
  .add-btn {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 9px 18px;
    border: 0.5px solid var(--border-mid);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.12s, border-color 0.12s;
  }
  .add-btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
  .add-btn:active { transform: scale(0.98); }
  .meta-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .meta-row select,
  .meta-row input[type=date],
  .meta-row input.cat-input {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    border: 0.5px solid var(--border-mid);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: border-color 0.15s;
  }
  .meta-row select:focus,
  .meta-row input[type=date]:focus,
  .meta-row input.cat-input:focus { border-color: var(--border-strong); }
  .meta-row input.cat-input { width: 130px; cursor: text; }
  .meta-row input.cat-input::placeholder { color: var(--text-3); }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filters { display: flex; gap: 4px; }
  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border: 0.5px solid transparent;
    border-radius: 8px;
    background: transparent;
    color: var(--text-2);
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.12s;
  }
  .filter-btn:hover { color: var(--text); }
  .filter-btn.active {
    border-color: var(--border-mid);
    background: var(--surface-2);
    color: var(--text);
  }
  .sort-row { display: flex; align-items: center; gap: 6px; }
  .sort-row label { font-size: 11px; color: var(--text-3); letter-spacing: 0.5px; }
  .sort-row select {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 9px;
    border: 0.5px solid var(--border-mid);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    cursor: pointer;
  }

  /* LIST */
  .list { display: flex; flex-direction: column; gap: 2px; }
  .item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 14px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    transition: opacity 0.2s, border-color 0.15s;
    animation: slideIn 0.18s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: none; }
  }
  .item:hover { border-color: var(--border-mid); }
  .item.done { opacity: 0.38; }
  .item.overdue:not(.done) { border-color: #F09595; }

  .check-box {
    width: 17px;
    height: 17px;
    border: 0.5px solid var(--border-strong);
    border-radius: 4px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
    transition: background 0.12s, border-color 0.12s;
    background: var(--surface);
  }
  .check-box.checked { background: var(--text); border-color: var(--text); }
  .check-box svg { display: none; width: 9px; height: 9px; }
  .check-box.checked svg { display: block; }

  .prio-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }
  .prio-high .prio-dot { background: var(--red); }
  .prio-med  .prio-dot { background: var(--amber); }
  .prio-low  .prio-dot { background: var(--green); }

  .item-body { flex: 1; min-width: 0; }
  .item-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    word-break: break-word;
  }
  .item.done .item-text { text-decoration: line-through; color: var(--text-3); }

  .item-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 5px;
    flex-wrap: wrap;
  }
  .cat-tag {
    font-size: 10px;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 3px;
    background: var(--surface-2);
    color: var(--text-2);
    border: 0.5px solid var(--border);
  }
  .due-tag { font-size: 10px; letter-spacing: 0.3px; color: var(--text-3); }
  .due-tag.overdue { color: var(--red); }
  .due-tag.today   { color: var(--amber); }

  .del-btn {
    width: 22px;
    height: 22px;
    border: none;
    background: transparent;
    color: var(--text-3);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.12s, color 0.12s;
    line-height: 1;
    flex-shrink: 0;
  }
  .item:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--text); }

  /* FOOTER */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 0.5px solid var(--border);
  }
  .count { font-size: 11px; color: var(--text-3); letter-spacing: 0.5px; }
  .footer-right { display: flex; align-items: center; gap: 10px; }
  .saved-flash {
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .saved-flash.show { opacity: 1; }
  .clear-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-3);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 0.5px;
    padding: 0;
    transition: color 0.12s;
  }
  .clear-btn:hover { color: var(--text); }

  .empty {
    text-align: center;
    padding: 2.5rem 0;
    font-size: 12px;
    color: var(--text-3);
    letter-spacing: 1px;
    border: 0.5px dashed var(--border-mid);
    border-radius: 8px;
  }

  /* STATS BAR */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .stat {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .stat-label { font-size: 10px; color: var(--text-3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 500; color: var(--text); }
  .stat-val.red   { color: var(--red); }
  .stat-val.amber { color: var(--amber); }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">daevud<span>.</span></a>
  <a class="nav-back" href="/">← tools</a>
</nav>

<main>
  <div class="page-header">
    <h1>to do.</h1>
    <p id="date-label">today</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">active</div>
      <div class="stat-val" id="stat-active">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">overdue</div>
      <div class="stat-val red" id="stat-overdue">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">done today</div>
      <div class="stat-val amber" id="stat-done">0</div>
    </div>
  </div>

  <div class="form-card">
    <div class="input-row">
      <input type="text" id="new-task" placeholder="add a task..." maxlength="140" />
      <button class="add-btn" onclick="addTask()">+ add</button>
    </div>
    <div class="meta-row">
      <select id="new-prio">
        <option value="med">— priority</option>
        <option value="high">high</option>
        <option value="med">medium</option>
        <option value="low">low</option>
      </select>
      <input type="date" id="new-due" title="due date" />
      <input type="text" class="cat-input" id="new-cat" placeholder="category" maxlength="30" list="cat-list" />
      <datalist id="cat-list"></datalist>
    </div>
  </div>

  <div class="toolbar">
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">all</button>
      <button class="filter-btn" onclick="setFilter('active',this)">active</button>
      <button class="filter-btn" onclick="setFilter('done',this)">done</button>
    </div>
    <div class="sort-row">
      <label>sort</label>
      <select id="sort-sel" onchange="render()">
        <option value="added">added</option>
        <option value="due">due date</option>
        <option value="priority">priority</option>
      </select>
    </div>
  </div>

  <div class="list" id="list"></div>

  <div class="footer">
    <span class="count" id="count"></span>
    <div class="footer-right">
      <span class="saved-flash" id="saved-flash">saved</span>
      <button class="clear-btn" onclick="clearDone()">clear completed</button>
    </div>
  </div>
</main>

<script>
const STORE = 'daevud_todo_v3';
const PRIO_ORDER = { high: 0, med: 1, low: 2 };
let tasks = load();
let filter = 'all';
let flashTimer = null;

function today() { return new Date().toISOString().slice(0, 10); }

function load() {
  try {
    const raw = localStorage.getItem(STORE);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return [
    { id: 1, text: "review color grade notes", done: false, prio: "high", due: "", cat: "work", added: Date.now() },
    { id: 2, text: "follow up with 38th & post", done: false, prio: "med", due: today(), cat: "outreach", added: Date.now() },
    { id: 3, text: "update invoice template", done: true, prio: "low", due: "", cat: "admin", added: Date.now() }
  ];
}

function save() {
  try { localStorage.setItem(STORE, JSON.stringify(tasks)); } catch(e) {}
  const fl = document.getElementById('saved-flash');
  fl.classList.add('show');
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => fl.classList.remove('show'), 1400);
}

function maxId() { return tasks.reduce((m, t) => Math.max(m, t.id), 0); }

function addTask() {
  const inp = document.getElementById('new-task');
  const text = inp.value.trim();
  if (!text) return;
  const prio = document.getElementById('new-prio').value || 'med';
  const due  = document.getElementById('new-due').value || '';
  const cat  = document.getElementById('new-cat').value.trim().toLowerCase() || '';
  tasks.unshift({ id: maxId() + 1, text, done: false, prio, due, cat, added: Date.now() });
  inp.value = '';
  document.getElementById('new-cat').value = '';
  document.getElementById('new-due').value = '';
  document.getElementById('new-prio').value = 'med';
  save(); render(); updateCatList();
}

function toggle(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}

function del(id) {
  tasks = tasks.filter(t => t.id !== id);
  save(); render(); updateCatList();
}

function clearDone() {
  tasks = tasks.filter(t => !t.done);
  save(); render();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function getSorted(arr) {
  const s = document.getElementById('sort-sel').value;
  const copy = [...arr];
  if (s === 'priority') copy.sort((a, b) => PRIO_ORDER[a.prio] - PRIO_ORDER[b.prio]);
  else if (s === 'due') copy.sort((a, b) => {
    if (!a.due && !b.due) return 0;
    if (!a.due) return 1;
    if (!b.due) return -1;
    return a.due.localeCompare(b.due);
  });
  return copy;
}

function fmtDue(d) {
  if (!d) return null;
  const t = today();
  if (d === t) return { label: 'today', cls: 'today' };
  if (d < t)   return { label: 'overdue ' + fmtDate(d), cls: 'overdue' };
  return { label: fmtDate(d), cls: '' };
}

function fmtDate(s) {
  const [y, m, d] = s.split('-');
  return `${m}/${d}/${y.slice(2)}`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  const t = today();
  let visible = tasks.filter(tk => filter === 'all' ? true : filter === 'done' ? tk.done : !tk.done);
  visible = getSorted(visible);

  const list = document.getElementById('list');
  if (visible.length === 0) {
    list.innerHTML = '<div class="empty">nothing here</div>';
  } else {
    list.innerHTML = visible.map(task => {
      const due = fmtDue(task.due);
      const isOverdue = !task.done && task.due && task.due < t;
      return `<div class="item${task.done ? ' done' : ''}${isOverdue ? ' overdue' : ''} prio-${task.prio}" id="item-${task.id}">
        <div class="check-box${task.done ? ' checked' : ''}" onclick="toggle(${task.id})">
          <svg viewBox="0 0 10 10" fill="none"><polyline points="1.5,5.5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="prio-dot" title="${task.prio} priority"></div>
        <div class="item-body">
          <div class="item-text">${esc(task.text)}</div>
          ${task.cat || due ? `<div class="item-meta">
            ${task.cat ? `<span class="cat-tag">${esc(task.cat)}</span>` : ''}
            ${due ? `<span class="due-tag ${due.cls}">${due.label}</span>` : ''}
          </div>` : ''}
        </div>
        <button class="del-btn" onclick="del(${task.id})" title="remove">×</button>
      </div>`;
    }).join('');
  }

  const active  = tasks.filter(t => !t.done).length;
  const overdue = tasks.filter(t => !t.done && t.due && t.due < t).length;
  const done    = tasks.filter(t => t.done).length;

  document.getElementById('count').textContent = `${active} item${active === 1 ? '' : 's'} left`;
  document.getElementById('stat-active').textContent  = active;
  document.getElementById('stat-overdue').textContent = overdue;
  document.getElementById('stat-done').textContent    = done;
}

function updateCatList() {
  const cats = [...new Set(tasks.map(t => t.cat).filter(Boolean))];
  document.getElementById('cat-list').innerHTML = cats.map(c => `<option value="${esc(c)}">`).join('');
}

function setDateLabel() {
  const d = new Date();
  const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  document.getElementById('date-label').textContent =
    `${days[d.getDay()]} — ${months[d.getMonth()]} ${d.getDate()}`;
}

document.getElementById('new-task').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

setDateLabel();
render();
updateCatList();
</script>
</body>
</html>
